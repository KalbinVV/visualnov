{% extends "base.html" %}
{% block title %}Фото-поддержка — USSC Romance{% endblock %}

{% block content %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-deep: #050508; --bg-surface: #0f0f16; --primary: #8b5cf6;
    --accent: #d8b4fe; --text-main: #fff; --text-muted: #94a3b8;
    --glass-bg: rgba(20,20,30,0.6); --glass-border: rgba(255,255,255,0.08);
    --radius-lg: 24px; --radius-md: 16px;
  }
  [data-theme="orange"] { --primary: #f97316; --accent: #fdba74; }
  [data-theme="dark-green"] { --primary: #10b981; --accent: #6ee7b7; }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif; background: var(--bg-deep);
    color: var(--text-main); min-height: 100vh; padding-top: 80px;
  }
  
  .chat-container {
    max-width: 600px; margin: 0 auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  
  .message {
    padding: 14px 18px; border-radius: 18px;
    max-width: 85%; line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  
  .message.bot {
    align-self: flex-start;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-bottom-left-radius: 4px;
  }
  .message.user {
    align-self: flex-end;
    background: var(--primary);
    color: white;
    border-bottom-right-radius: 4px;
  }
  
  .message img {
    max-width: 100%; border-radius: 12px; margin-top: 8px;
    border: 1px solid var(--glass-border);
  }
  
  .input-area {
    position: sticky; bottom: 0;
    background: var(--bg-surface);
    padding: 12px; border-top: 1px solid var(--glass-border);
    display: flex; gap: 10px; align-items: center;
  }
  
  .btn-camera, .btn-send {
    background: var(--primary); border: none; color: white;
    padding: 12px 20px; border-radius: 50px; cursor: pointer;
    font-weight: 500; transition: filter 0.2s;
  }
  .btn-camera:hover, .btn-send:hover { filter: brightness(1.1); }
  
  #fileInput { display: none; }
  
  .preview-container {
    position: relative; margin: 10px 0;
  }
  .preview-container img {
    width: 100%; border-radius: 16px;
    border: 1px solid var(--glass-border);
  }
  .preview-close {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.6); border: none;
    color: white; width: 28px; height: 28px;
    border-radius: 50%; cursor: pointer; font-size: 18px;
  }
  
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px;
    font-size: 12px; background: rgba(139,92,246,0.2);
    color: var(--accent); margin-bottom: 12px;
  }
  .status-badge.waiting { background: rgba(249,115,22,0.2); color: #fdba74; }
  .status-badge.replied { background: rgba(16,185,129,0.2); color: #6ee7b7; }
  
  #descriptionInput {
    flex: 1; padding: 12px 16px; border-radius: 24px;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg); color: var(--text-main);
    font-size: 14px; resize: none; max-height: 100px;
  }
  #descriptionInput::placeholder { color: var(--text-muted); }
  
  .hidden { display: none !important; }
  
  @media (max-width: 768px) {
    .chat-container { padding: 16px; }
    .message { max-width: 90%; }
  }
</style>

<div class="chat-container" id="chatContainer">
  <div class="status-badge waiting" id="statusBadge">
    <span>⏳</span> Ожидание ответа администратора
  </div>
  
  <div class="message bot">
    👋 Привет! Отправьте скриншот или фото проблемы — я передам его администратору.<br><br>
    <small style="color: var(--text-muted)">Фото хранится временно и удаляется после ответа.</small>
  </div>
</div>

<div class="input-area">
  <button class="btn-camera" onclick="document.getElementById('fileInput').click()">📷</button>
  <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
  
  <textarea id="descriptionInput" placeholder="Описание (необязательно)..." rows="1"></textarea>
  
  <button class="btn-send" id="sendBtn" onclick="sendPhoto()">➤</button>
</div>

<div class="preview-container hidden" id="previewContainer">
  <button class="preview-close" onclick="clearPreview()">✕</button>
  <img id="previewImage" src="" alt="Preview">
</div>

<script>
let currentSubmissionId = null;
let pollInterval = null;

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('previewImage').src = ev.target.result;
    document.getElementById('previewContainer').classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

function clearPreview() {
  document.getElementById('previewContainer').classList.add('hidden');
  document.getElementById('fileInput').value = '';
  document.getElementById('previewImage').src = '';
}

async function sendPhoto() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) { alert('Выберите фото'); return; }
  
  const description = document.getElementById('descriptionInput').value;
  const formData = new FormData();
  formData.append('photo', file);
  formData.append('description', description);
  
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳';
  
  try {
    const res = await fetch('/api/support/photo', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('session_token') || '') },
      body: formData
    });
    const data = await res.json();
    
    if (data.success) {
      // Добавляем сообщение пользователя в чат
      addMessage('user', `<img src="${URL.createObjectURL(file)}">` + (description ? `<br><small>${description}</small>` : ''));
      clearPreview();
      document.getElementById('descriptionInput').value = '';
      
      // Начинаем polling
      currentSubmissionId = data.submission_id;
      startPolling();
      
      // Обновляем статус
      document.getElementById('statusBadge').className = 'status-badge waiting';
      document.getElementById('statusBadge').innerHTML = '<span>⏳</span> Ожидание ответа...';
    } else {
      alert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
    }
  } catch (err) {
    console.error(err);
    alert('Ошибка сети');
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = '➤';
  }
}

function addMessage(sender, content) {
  const chat = document.getElementById('chatContainer');
  const msg = document.createElement('div');
  msg.className = `message ${sender}`;
  msg.innerHTML = content;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  
  pollInterval = setInterval(async () => {
    if (!currentSubmissionId) return;
    
    try {
      const res = await fetch(`/api/support/photo/${currentSubmissionId}/status`);
      const data = await res.json();
      
      if (data.success && data.has_reply && data.reply) {
        addMessage('bot', data.reply);
        document.getElementById('statusBadge').className = 'status-badge replied';
        document.getElementById('statusBadge').innerHTML = '<span>✓</span> Ответ получен';
        clearInterval(pollInterval);
        pollInterval = null;
      }
    } catch (e) {
      console.error('Polling error:', e);
    }
  }, 5000);
}

// Авто-высота textarea
document.getElementById('descriptionInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Очистка при уходе со страницы
window.addEventListener('beforeunload', () => {
  if (pollInterval) clearInterval(pollInterval);
});
</script>
{% endblock %}
