<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщения — USSC Romance</title>

    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            /* USSC Romance Design System */
            --bg-deep: #050508;
            --bg-surface: #0f0f16;
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #d8b4fe;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --glass-bg: rgba(20, 20, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-hover: rgba(255, 255, 255, 0.03);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;

            --font-display: 'Playfair Display', serif;
            --font-ui: 'Inter', sans-serif;

            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
        }

        /* Темы */
        [data-theme="orange"] {
            --primary: #f97316;
            --primary-glow: rgba(249, 115, 22, 0.5);
            --accent: #fdba74;
            --bg-deep: #080402;
            --bg-surface: #150a05;
        }

        [data-theme="dark-green"] {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.5);
            --accent: #6ee7b7;
            --bg-deep: #020403;
            --bg-surface: #05150f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-deep);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Навигация --- */
        .glass-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(5, 5, 8, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .nav-content {
            width: 100%;
            max-width: 1400px;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--text-main);
        }

        .brand-icon { font-size: 28px; filter: drop-shadow(0 0 10px var(--primary-glow)); }
        .highlight { color: var(--primary); font-style: italic; }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
        }

        .nav-links button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-links button:hover, .nav-links button.active {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--primary);
            color: var(--text-main);
        }

        .nav-links button.danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Профиль */
        .profile-trigger {
            position: relative;
            cursor: pointer;
        }

        .avatar-ring {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, var(--primary), transparent);
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-trigger:hover .avatar-ring { transform: scale(1.05); }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--text-main);
            border: 2px solid var(--bg-deep);
            font-size: 18px;
        }

        .profile-dropdown {
            position: absolute;
            top: 60px;
            right: 0;
            width: 220px;
            background: rgba(15, 15, 22, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 8px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .profile-trigger:hover .profile-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
            font-size: 14px;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
        }

        .dropdown-item.danger:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--glass-border);
            margin: 6px 0;
        }

        /* --- Main Content --- */
        .main-stage {
            padding-top: 120px;
            padding-bottom: 60px;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 32px;
            padding-right: 32px;
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeInUp 0.6s ease-out forwards; }

        /* Карточки */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-header {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Кнопки */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            font-family: var(--font-ui);
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            border-color: var(--text-main);
            color: var(--text-main);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* Формы */
        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            font-size: 14px;
            font-family: var(--font-ui);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        textarea.form-control {
            min-height: 150px;
            resize: vertical;
        }

        input[type="file"].form-control {
            padding: 12px;
            cursor: pointer;
        }

        /* Таблицы */
        .table-container {
            overflow-x: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th, .table td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .table th {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table td {
            font-size: 14px;
            color: var(--text-main);
        }

        .table tr {
            transition: background 0.2s ease;
            cursor: pointer;
        }

        .table tr:hover {
            background: var(--card-hover);
        }

        .table tr:last-child td {
            border-bottom: none;
        }

        /* Бейджи */
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #fdba74;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-answered {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-new {
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent);
            border: 1px solid rgba(139, 92, 246, 0.3);
            animation: pulse 2s infinite;
        }

        /* Уведомления */
        .alert {
            padding: 16px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--success);
            color: #6ee7b7;
        }

        .hidden { display: none !important; }

        /* Login Section */
        .login-wrapper {
            max-width: 440px;
            margin: 80px auto;
        }

        .login-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            backdrop-filter: blur(20px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h2 {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* View Message */
        .message-meta {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .message-content {
            white-space: pre-wrap;
            line-height: 1.7;
            color: var(--text-main);
            margin-bottom: 24px;
        }

        .message-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: var(--radius-md);
            margin-top: 16px;
            border: 1px solid var(--glass-border);
        }

        .response-item {
            background: rgba(139, 92, 246, 0.1);
            border-left: 3px solid var(--primary);
            padding: 20px;
            margin-top: 16px;
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .response-author {
            font-weight: 600;
            color: var(--accent);
        }

        .response-date {
            font-size: 12px;
            color: var(--text-muted);
        }

        .response-content {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 14px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .nav-content { padding: 0 20px; }
            .nav-links { display: none; }
            .main-stage { padding-top: 100px; padding-left: 20px; padding-right: 20px; }
            .glass-card { padding: 24px; }
            .card-header { font-size: 20px; flex-direction: column; gap: 12px; align-items: flex-start; }
            .table th, .table td { padding: 12px 16px; font-size: 13px; }
            .login-card { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <nav class="glass-nav" id="navbar">
        <div class="nav-content">
            <a href="#" class="brand">
                <span class="brand-icon">💬</span>
                <span class="brand-text">USSC <span class="highlight">Messages</span></span>
            </a>

            <div class="nav-actions">
                <ul class="nav-links">
                    <li><button onclick="showSection('dashboard')" id="nav-dashboard" class="active">Мои сообщения</button></li>
                    <li><button onclick="showSection('create')" id="nav-create">Новое сообщение</button></li>
                    <li id="admin-link" style="display:none;"><button onclick="showSection('admin')" id="nav-admin">Админ-панель</button></li>
                </ul>

                <div class="profile-trigger">
                    <div class="avatar-ring">
                        <span class="avatar-placeholder" id="user-avatar">U</span>
                    </div>
                    <div class="profile-dropdown">
                        <div class="dropdown-item" style="cursor: default;">
                            <span>👤</span> <span id="user-display">User</span>
                        </div>
                        <div class="dropdown-divider"></div>
                        <button onclick="logout()" class="dropdown-item danger" style="width:100%;text-align:left;">
                            <span>🚪</span> Выйти
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-stage">
        <!-- Login Section -->
        <div id="login-section" class="section active">
            <div class="login-wrapper">
                <div class="login-card">
                    <div class="login-header">
                        <h2>Вход в систему</h2>
                        <p>Введите свои данные для доступа к сообщениям</p>
                    </div>
                    <div id="login-error" class="alert alert-error hidden"></div>
                    <form onsubmit="return login(event)">
                        <div class="form-group">
                            <label>Имя пользователя или Email</label>
                            <input type="text" class="form-control" id="login-identifier" required placeholder="username или email">
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" class="form-control" id="login-password" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%">Войти</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="section">
            <div class="glass-card">
                <div class="card-header">
                    <span>Мои сообщения</span>
                    <span id="unread-badge" class="badge badge-new hidden">0 новых</span>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Тема</th>
                                <th>От</th>
                                <th>Дата</th>
                                <th>Статус</th>
                            </tr>
                        </thead>
                        <tbody id="messages-table"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- View Message Section -->
        <div id="view-section" class="section">
            <button class="btn btn-secondary btn-sm" onclick="showSection('dashboard')" style="margin-bottom:16px;">← Назад к списку</button>
            <div class="glass-card">
                <div class="card-header" id="view-subject"></div>
                <div class="message-meta" id="view-meta"></div>
                <div class="message-content" id="view-content"></div>
                <img id="view-image" class="message-image hidden">
                <div id="view-responses"></div>
                <div id="respond-form" class="hidden" style="margin-top:32px;padding-top:24px;border-top:1px solid var(--glass-border);">
                    <div class="card-header" style="font-size:20px;margin-bottom:16px;">Ответить</div>
                    <form onsubmit="return respond(event)">
                        <input type="hidden" id="respond-message-id">
                        <div class="form-group">
                            <label>Ваш ответ</label>
                            <textarea class="form-control" id="respond-content" name="content" required placeholder="Введите текст ответа..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Изображение (необязательно)</label>
                            <input type="file" class="form-control" id="respond-image" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-primary">Отправить ответ</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Create Message Section -->
        <div id="create-section" class="section">
            <button class="btn btn-secondary btn-sm" onclick="showSection('dashboard')" style="margin-bottom:16px;">← Назад</button>
            <div class="glass-card" style="max-width:700px;">
                <div class="card-header">Новое сообщение</div>
                <div id="create-error" class="alert alert-error hidden"></div>
                <div id="create-success" class="alert alert-success hidden"></div>
                <form onsubmit="return createMessage(event)">
                    <div class="form-group">
                        <label>Тема</label>
                        <input type="text" class="form-control" id="subject" name="subject" required maxlength="200" placeholder="Краткая тема сообщения">
                    </div>
                    <div class="form-group">
                        <label>Сообщение</label>
                        <textarea class="form-control" id="content" name="content" required placeholder="Опишите ваш вопрос или предложение..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Изображение (необязательно)</label>
                        <input type="file" class="form-control" id="image" name="image" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить сообщение</button>
                </form>
            </div>
        </div>

        <!-- Admin Section -->
        <div id="admin-section" class="section">
            <div class="glass-card">
                <div class="card-header">
                    <span>⏳ Ожидают ответа</span>
                    <span class="badge badge-pending" id="pending-count">0</span>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Тема</th>
                                <th>От</th>
                                <th>Дата</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="admin-pending-table"></tbody>
                    </table>
                </div>
            </div>
            <div class="glass-card">
                <div class="card-header">Все сообщения</div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Тема</th>
                                <th>От</th>
                                <th>Дата</th>
                                <th>Статус</th>
                            </tr>
                        </thead>
                        <tbody id="admin-all-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = {{ user | tojson if user else 'null' }};

        async function api(url, options = {}) {
            const res = await fetch(url, options);
            return await res.json();
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-section').classList.add('active');

            // Update nav buttons
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
            const navBtn = document.getElementById('nav-' + id);
            if (navBtn) navBtn.classList.add('active');

            if (id === 'dashboard') loadMessages();
            if (id === 'admin') loadAdmin();
        }

        function showError(el, msg) {
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        async function login(e) {
            e.preventDefault();
            const identifier = document.getElementById('login-identifier').value;
            const password = document.getElementById('login-password').value;
            const err = document.getElementById('login-error');
            err.classList.add('hidden');
            const data = await api('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({identifier, password})
            });
            if (data.success) {
                currentUser = data.user;
                document.getElementById('navbar').style.display = 'flex';
                document.getElementById('user-display').textContent = currentUser.display_name;
                document.getElementById('user-avatar').textContent = currentUser.display_name[0].toUpperCase();
                if (currentUser.is_admin) document.getElementById('admin-link').style.display = 'block';
                showSection('dashboard');
                loadUnreadCount();
            } else {
                showError(err, data.error);
            }
        }

        async function logout() {
            if (!confirm('Выйти из аккаунта?')) return;
            await api('/api/logout', {method: 'POST'});
            currentUser = null;
            document.getElementById('navbar').style.display = 'none';
            showSection('login');
        }

        async function loadMessages() {
            const data = await api('/api/messages');
            const tbody = document.getElementById('messages-table');
            tbody.innerHTML = '';
            if (!data.success || !data.messages.length) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:40px;">Нет сообщений</td></tr>';
                return;
            }
            data.messages.forEach(m => {
                const tr = document.createElement('tr');
                tr.onclick = () => viewMessage(m.id);
                tr.innerHTML = `
                    <td style="font-weight:500;">${m.subject}</td>
                    <td>${m.username}</td>
                    <td>${new Date(m.created_at).toLocaleString('ru-RU')}</td>
                    <td><span class="badge ${m.is_responded ? 'badge-answered' : 'badge-pending'}">${m.is_responded ? 'Отвечено' : 'Ожидает'}</span></td>
                `;
                tbody.appendChild(tr);
            });
            loadUnreadCount();
        }

        async function loadUnreadCount() {
            const data = await api('/api/messages/count');
            const badge = document.getElementById('unread-badge');
            if (data.count > 0) {
                badge.textContent = data.count + ' новых';
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        async function viewMessage(id) {
            const data = await api('/api/messages/' + id);
            if (!data.success) return alert(data.error);
            const m = data.message;
            document.getElementById('view-subject').textContent = m.subject;
            document.getElementById('view-meta').textContent = `От: ${m.username} | ${new Date(m.created_at).toLocaleString('ru-RU')}`;
            document.getElementById('view-content').textContent = m.content;
            const img = document.getElementById('view-image');
            if (m.image_path) {
                img.src = m.image_path;
                img.classList.remove('hidden');
            } else {
                img.classList.add('hidden');
            }
            const respDiv = document.getElementById('view-responses');
            respDiv.innerHTML = '';
            if (data.responses && data.responses.length) {
                data.responses.forEach(r => {
                    respDiv.innerHTML += `
                        <div class="response-item">
                            <div class="response-header">
                                <span class="response-author">${r.admin_username}</span>
                                <span class="response-date">${new Date(r.created_at).toLocaleString('ru-RU')}</span>
                            </div>
                            <div class="response-content">${r.content}</div>
                            ${r.image_path ? `<img src="${r.image_path}" class="message-image">` : ''}
                        </div>
                    `;
                });
            }
            const respondForm = document.getElementById('respond-form');
            if (currentUser.is_admin && !m.is_responded) {
                document.getElementById('respond-message-id').value = id;
                respondForm.classList.remove('hidden');
            } else {
                respondForm.classList.add('hidden');
            }
            showSection('view');
        }

        async function createMessage(e) {
            e.preventDefault();
            const form = e.target;
            const fd = new FormData(form);
            const err = document.getElementById('create-error');
            const suc = document.getElementById('create-success');
            err.classList.add('hidden');
            suc.classList.add('hidden');
            const data = await api('/api/messages', {method: 'POST', body: fd});
            if (data.success) {
                suc.textContent = 'Сообщение успешно отправлено!';
                suc.classList.remove('hidden');
                form.reset();
                setTimeout(() => showSection('dashboard'), 1500);
            } else {
                showError(err, data.error);
            }
        }

        async function respond(e) {
            e.preventDefault();
            const id = document.getElementById('respond-message-id').value;
            const form = e.target;
            const fd = new FormData(form);
            const data = await api('/api/messages/' + id + '/respond', {method: 'POST', body: fd});
            if (data.success) {
                alert('Ответ отправлен!');
                viewMessage(id);
            } else {
                alert(data.error || 'Ошибка');
            }
        }

        async function loadAdmin() {
            const pending = await api('/api/messages/pending');
            const all = await api('/api/messages');
            const pendingTbody = document.getElementById('admin-pending-table');
            const allTbody = document.getElementById('admin-all-table');
            pendingTbody.innerHTML = '';
            allTbody.innerHTML = '';

            if (pending.success && pending.messages.length) {
                document.getElementById('pending-count').textContent = pending.messages.length;
                pending.messages.forEach(m => {
                    pendingTbody.innerHTML += `
                        <tr onclick="viewMessage(${m.id})" style="cursor:pointer">
                            <td style="font-weight:500;">${m.subject}</td>
                            <td>${m.username}</td>
                            <td>${new Date(m.created_at).toLocaleString('ru-RU')}</td>
                            <td>
                                <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();viewMessage(${m.id})">Ответить</button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                document.getElementById('pending-count').textContent = '0';
                pendingTbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:40px;">Нет ожидающих ответов</td></tr>';
            }

            if (all.success && all.messages.length) {
                all.messages.forEach(m => {
                    allTbody.innerHTML += `
                        <tr onclick="viewMessage(${m.id})" style="cursor:pointer">
                            <td style="font-weight:500;">${m.subject}</td>
                            <td>${m.username}</td>
                            <td>${new Date(m.created_at).toLocaleString('ru-RU')}</td>
                            <td><span class="badge ${m.is_responded ? 'badge-answered' : 'badge-pending'}">${m.is_responded ? 'Отвечено' : 'Ожидает'}</span></td>
                        </tr>
                    `;
                });
            }
        }

        // Init
        if (currentUser) {
            document.getElementById('navbar').style.display = 'flex';
            document.getElementById('user-display').textContent = currentUser.display_name;
            document.getElementById('user-avatar').textContent = currentUser.display_name[0].toUpperCase();
            if (currentUser.is_admin) document.getElementById('admin-link').style.display = 'block';
            showSection('dashboard');
            loadUnreadCount();
        } else {
            showSection('login');
        }
    </script>
</body>
</html>
