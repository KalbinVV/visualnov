{% extends "base.html" %}
{% block title %}Поддержка — USSC Romance{% endblock %}

{% block content %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-deep: #050508; --bg-surface: #0f0f16; --primary: #8b5cf6;
    --accent: #d8b4fe; --text-main: #fff; --text-muted: #94a3b8;
    --glass-bg: rgba(20,20,30,0.6); --glass-border: rgba(255,255,255,0.08);
    --radius-lg: 24px; --radius-md: 16px;
  }
  [data-theme="orange"] { --primary: #f97316; --accent: #fdba74; }
  [data-theme="dark-green"] { --primary: #10b981; --accent: #6ee7b7; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif; background: var(--bg-deep);
    color: var(--text-main); min-height: 100vh; padding-top: 80px;
    padding-bottom: 100px;
  }

  .support-container {
    max-width: 800px; margin: 0 auto; padding: 24px;
  }

  .support-header {
    margin-bottom: 24px;
    padding: 20px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
  }

  .support-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    margin-bottom: 8px;
  }

  .support-header p {
    font-size: 14px;
    color: var(--text-muted);
  }

  .chat-container {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 400px;
    max-height: 60vh;
    overflow-y: auto;
    padding: 20px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    margin-bottom: 20px;
  }

  .message {
    padding: 14px 18px;
    border-radius: 18px;
    max-width: 85%;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: none; }
  }

  .message.admin {
    align-self: flex-start;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-bottom-left-radius: 4px;
  }

  .message.user {
    align-self: flex-end;
    background: var(--primary);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .message img {
    max-width: 100%;
    border-radius: 12px;
    margin-top: 8px;
    border: 1px solid var(--glass-border);
  }

  .message-time {
    font-size: 11px;
    opacity: 0.6;
    margin-top: 6px;
  }

  .empty-chat {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }

  .input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-surface);
    padding: 16px;
    border-top: 1px solid var(--glass-border);
    display: flex;
    gap: 12px;
    align-items: flex-end;
    justify-content: center;
  }

  .input-wrapper {
    max-width: 800px;
    width: 100%;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .btn-send, .btn-attach {
    background: var(--primary);
    border: none;
    color: white;
    padding: 14px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-send:hover, .btn-attach:hover {
    filter: brightness(1.1);
  }
  .btn-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #fileInput {
    display: none;
  }

  #messageInput {
    flex: 1;
    padding: 14px 18px;
    border-radius: 24px;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    color: var(--text-main);
    font-size: 14px;
    resize: none;
    max-height: 120px;
    font-family: 'Inter', sans-serif;
  }
  #messageInput:focus {
    outline: none;
    border-color: var(--primary);
  }
  #messageInput::placeholder {
    color: var(--text-muted);
  }

  .preview-container {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 800px;
    width: 90%;
    z-index: 100;
  }

  .preview-container img {
    width: 100%;
    border-radius: 16px;
    border: 1px solid var(--glass-border);
  }

  .preview-close {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
  }

  .hidden {
    display: none !important;
  }

  .status-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    margin-top: 8px;
  }
  .status-waiting {
    background: rgba(249,115,22,0.2);
    color: #fdba74;
  }
  .status-replied {
    background: rgba(16,185,129,0.2);
    color: #6ee7b7;
  }

  @media (max-width: 768px) {
    .support-container { padding: 16px; }
    .message { max-width: 90%; }
    .input-wrapper { padding: 0 8px; }
  }
</style>

<div class="support-container">
  <div class="support-header">
    <h1>💬 Поддержка</h1>
    <p>Напишите нам — ответим в ближайшее время</p>
    <div id="statusIndicator" class="status-indicator status-waiting hidden">
      <span>⏳</span> Ожидание ответа
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="empty-chat" id="emptyChat">
      <p>Здесь появится история переписки</p>
      <p style="margin-top: 10px; font-size: 13px;">Отправьте первое сообщение</p>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <button class="btn-attach" onclick="document.getElementById('fileInput').click()">📎</button>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">

    <textarea id="messageInput" placeholder="Введите сообщение..." rows="1"></textarea>

    <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="preview-container hidden" id="previewContainer">
  <button class="preview-close" onclick="clearPreview()">✕</button>
  <img id="previewImage" src="" alt="Preview">
</div>

<script>
let pollInterval = null;
let hasConversation = false;

async function loadConversation() {
  try {
    const res = await fetch('/api/support/conversation');
    const data = await res.json();

    if (data.success && data.conversation.messages.length > 0) {
      hasConversation = true;
      renderMessages(data.conversation.messages);
      updateStatus(data.conversation.has_reply);
      document.getElementById('emptyChat').classList.add('hidden');
    }
  } catch (e) {
    console.error('Load error:', e);
  }
}

function renderMessages(messages) {
  const chat = document.getElementById('chatContainer');
  chat.innerHTML = '';

  messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = `message ${msg.from}`;
    let html = '';
    if (msg.text) html += `<div>${msg.text}</div>`;
    if (msg.photo) html += `<img src="${msg.photo}" alt="Photo">`;
    html += `<div class="message-time">${msg.timestamp.slice(0, 16)}</div>`;
    div.innerHTML = html;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

function updateStatus(hasReply) {
  const indicator = document.getElementById('statusIndicator');
  if (hasReply) {
    indicator.className = 'status-indicator status-replied';
    indicator.innerHTML = '<span>✓</span> Есть ответ';
  } else {
    indicator.className = 'status-indicator status-waiting';
    indicator.innerHTML = '<span>⏳</span> Ожидание ответа';
  }
  indicator.classList.remove('hidden');
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('previewImage').src = ev.target.result;
    document.getElementById('previewContainer').classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

function clearPreview() {
  document.getElementById('previewContainer').classList.add('hidden');
  document.getElementById('fileInput').value = '';
  document.getElementById('previewImage').src = '';
}

async function sendMessage() {
  const messageText = document.getElementById('messageInput').value.trim();
  const file = document.getElementById('fileInput').files[0];

  if (!messageText && !file) return;

  const formData = new FormData();
  formData.append('message', messageText);
  if (file) formData.append('photo', file);

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  try {
    const res = await fetch('/api/support/message', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();

    if (data.success) {
      document.getElementById('messageInput').value = '';
      clearPreview();
      loadConversation();
    } else {
      alert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
    }
  } catch (err) {
    console.error(err);
    alert('Ошибка сети');
  } finally {
    sendBtn.disabled = false;
  }
}

pollInterval = setInterval(loadConversation, 5000);
loadConversation();

document.getElementById('messageInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

window.addEventListener('beforeunload', () => {
  if (pollInterval) clearInterval(pollInterval);
});
</script>
{% endblock %}
