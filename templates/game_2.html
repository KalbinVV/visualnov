<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Визуальная новелла — Диалог</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');

    :root {
      --primary: #8b5cf6;
      --primary-glow: rgba(139, 92, 246, 0.5);
      --bg-dark: #0f0c29;
      --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --glass-border: rgba(255, 255, 255, 0.1);

      --text-main: #ffffff;
      --text-muted: #94a3b8;

      --bubble-bg: rgba(255, 255, 255, 0.95);
      --choice-bg: rgba(30, 30, 50, 0.85);
      --choice-hover: rgba(139, 92, 246, 0.9);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: var(--text-main);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* --- Main Wrapper --- */
    .app-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--bg-gradient);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Адаптивность для десктопа: ограничиваем размер, сохраняя пропорции */
    @media (min-width: 1024px) {
      .app-wrapper {
        width: 90vw;
        height: 90vh;
        max-width: 1400px;
        max-height: 900px;
        border-radius: 24px;
        box-shadow: 0 0 50px rgba(0,0,0,0.5);
        border: 1px solid var(--glass-border);
      }
    }

    /* --- Background & Character --- */
    .scene-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
      transition: background-image 0.5s ease;
    }

    .character {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 85vh; /* Адаптивная высота относительно экрана */
      max-height: 80%;
      max-width: 100%;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.5s ease;
    }

    /* --- UI Layer --- */
    .ui-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }

    /* --- Top Bar (FIXED) --- */
    .top-bar {
      pointer-events: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5vh 2vw; /* Адаптивные отступы */
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      width: 100%;
      z-index: 20;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 15px; /* Отступ между кнопкой назад и заголовком */
    }

    .game-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 2vw, 1.5rem); /* Адаптивный шрифт */
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60vw;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
      flex-shrink: 0; /* Кнопки не сжимаются */
    }

    .icon-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
    .icon-btn:active { transform: scale(0.95); }

    .icon-btn svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2; }

    /* --- Diamonds Widget --- */
    .diamonds-widget {
      pointer-events: auto;
      position: absolute;
      top: 1.5vh;
      right: 2vw;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 50px;
      border: 1px solid rgba(139, 92, 246, 0.4);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s;
      z-index: 20;
    }

    .diamonds-widget:active { transform: scale(0.95); }
    .diamonds-widget span { font-weight: 700; color: #d8b4fe; font-size: 0.9rem; }

    /* --- Dialogue Area --- */
    .dialogue-area {
      pointer-events: auto;
      width: 100%;
      padding: 0 5% 2vh;
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 900px;
      margin: 0 auto;
      align-items: flex-start;
    }

    .bubble {
      background: var(--bubble-bg);
      border-radius: 20px;
      padding: 20px 24px 24px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 80%;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      transform: translateY(20px);
    }

    .bubble.show { opacity: 1; transform: translateY(0); }

    .name-tag {
      position: absolute;
      top: -12px;
      left: 20px;
      background: var(--primary);
      color: white;
      padding: 4px 14px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(139, 92, 246, 0.4);
    }

    .dialogue-text {
      font-size: clamp(0.9rem, 1.8vw, 1.1rem);
      line-height: 1.5;
      color: #1e1e2e;
      font-weight: 500;
    }

    /* --- Choices Area (FIXED) --- */
    .choices-area {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 5% 5vh;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      align-items: center;
    }

    .choice-btn {
      background: var(--choice-bg);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 16px 20px;
      border-radius: 16px;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      min-height: 60px;
    }

    .choice-btn:hover {
      background: var(--choice-hover);
      transform: translateY(-2px);
      border-color: var(--primary);
    }

    .choice-btn:active { transform: scale(0.98); }

    .choice-content { flex: 1; text-align: center; }

    .premium-badge {
      background: rgba(255, 255, 255, 0.15);
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      color: #fbbf24;
      margin-left: 10px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    /* --- Input Choice --- */
    .input-wrapper {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .input-wrapper input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 14px 16px;
      border-radius: 12px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
    }
    .input-wrapper button {
      background: var(--primary);
      border: none;
      padding: 0 24px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
    }

    /* --- Animations --- */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hide { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .visible { opacity: 1; pointer-events: auto; transition: opacity 0.5s; }

    /* --- Modals --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show { opacity: 1; pointer-events: auto; }

    .modal-card {
      background: #1a1a2e;
      border: 1px solid var(--glass-border);
      padding: 30px;
      border-radius: 24px;
      width: 85%;
      max-width: 400px;
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .modal-overlay.show .modal-card { transform: scale(1); }

    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--primary); }
    .close-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
    .modal-balance { font-size: 2.5rem; font-weight: 800; text-align: center; background: linear-gradient(to right, #a78bfa, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
    .modal-list { list-style: none; margin-bottom: 20px; }
    .modal-list li { padding: 8px 0; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 10px; }
    .modal-list li::before { content: '💎'; font-size: 0.8rem; }

  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- Background Layer -->
  <div class="scene-bg" id="sceneBg"></div>
  <img class="character" id="characterImg" alt="Character">

  <!-- UI Layer -->
  <div class="ui-layer">

    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-left">
        <button class="icon-btn" onclick="goBack()">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="game-title">{{ game_info.title }}</div>
      </div>

      <div style="display: flex; gap: 12px;">
        <button class="icon-btn" onclick="toggleDialogues()" title="Скрыть диалоги">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
        <button class="icon-btn" onclick="showMenu()">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </div>
    </div>

    <!-- Currency Widget -->
    <div class="diamonds-widget" onclick="showDiamondModal()">
      <span id="topDiamondDisplay">{{ user.diamonds }} 💎</span>
    </div>

    <!-- Dialogue Container -->
    <div class="dialogue-area" id="dialogueContainer">
      <div class="bubble" id="bubble">
        <div class="name-tag" id="charName">Джейни</div>
        <div class="dialogue-text" id="dialogueText"></div>
      </div>
    </div>

    <!-- Choices Container -->
    <div class="choices-area" id="choicesContainer">
      <!-- Choices injected by JS -->
    </div>

  </div>

</div>

<!-- Game Menu Modal -->
<div class="modal-overlay" id="gameMenu">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">Меню</div>
      <button class="close-btn" onclick="hideMenu()">×</button>
    </div>
    <button class="choice-btn" style="justify-content: center; margin-bottom: 10px;" onclick="hideMenu()">Продолжить</button>
    <button class="choice-btn" style="justify-content: center; background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.3);" onclick="exitToDashboard()">Выйти</button>
  </div>
</div>

<!-- Diamond Info Modal -->
<div class="modal-overlay" id="diamondModal">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">Алмазы</div>
      <button class="close-btn" onclick="hideDiamondModal()">×</button>
    </div>
    <div class="modal-balance" id="modalDiamondBalance">{{ user.diamonds }} 💎</div>

    <ul class="modal-list">
      <li>Открывайте премиум-выборы</li>
      <li>Получайте эксклюзивные концовки</li>
      <li>Разблокируйте особые сцены</li>
    </ul>
    <p style="text-align: center; font-size: 0.8rem; color: var(--text-muted);">Сохраняются между сессиями</p>
  </div>
</div>

<script>
  let gameInfo = {{ game_info|tojson }};
  let sceneData = {{ scene_data|tojson }};
  let storyId = {{ story_id }};

  document.addEventListener('DOMContentLoaded', function() {
    loadScene();
  });

  function loadScene() {
    // Background
    if (sceneData.background) {
      document.getElementById('sceneBg').style.backgroundImage = `url('${sceneData.background}')`;
    }

    // Character
    const charImg = document.getElementById('characterImg');
    if (sceneData.character_image) {
      charImg.src = `${sceneData.character_image}`;
      charImg.style.display = 'block';
    } else {
      charImg.style.display = 'none';
    }

    // Effects
    let sceneEffect = null;
    if (sceneData.scene_effect == 'character_appears') {
      sceneEffect = () => {
        charImg.classList.remove('hide');
        charImg.classList.add('visible');
      }
    } else if(sceneData.scene_effect == 'character_disappears') {
      sceneEffect = () => {
        charImg.classList.add('hide');
      }
    } else if(sceneData.scene_effect == 'blackout') {
      sceneEffect = () => {
        document.querySelector('.app-wrapper').style.filter = 'brightness(0.2)';
      }
    }

    if(sceneEffect) charImg.onload = sceneEffect;

    // Text
    document.getElementById('charName').innerHTML = sceneData.character_name;
    const dialogueText = document.getElementById('dialogueText');
    dialogueText.innerHTML = sceneData.dialogue;

    // Bubble Animation Reset
    const bubble = document.getElementById('bubble');
    bubble.classList.remove('show');

    // Update Diamonds
    const diamondsCount = sceneData.current_user_diamonds || {{ user.diamonds }};
    document.getElementById('topDiamondDisplay').innerHTML = diamondsCount + " 💎";
    document.getElementById('modalDiamondBalance').textContent = diamondsCount + " 💎";

    // Trigger Animation
    setTimeout(() => {
      bubble.classList.add('show');
    }, 50);

    renderChoices();
  }

  function renderInputChoice() {
     const choicesContainer = document.getElementById('choicesContainer');
     choicesContainer.innerHTML = '';

     const wrapper = document.createElement('div');
     wrapper.className = 'input-wrapper';

     const input = document.createElement('input');
     input.type = 'text';
     input.placeholder = 'Ваш ответ...';

     const btn = document.createElement('button');
     btn.innerText = 'Отправить';
     btn.onclick = makeInputChoice;

     wrapper.appendChild(input);
     wrapper.appendChild(btn);
     choicesContainer.appendChild(wrapper);
  }

  function renderChoices() {
    const choicesContainer = document.getElementById('choicesContainer');
    choicesContainer.innerHTML = '';

    if (sceneData.scene_type == 'input') {
      renderInputChoice();
    } else if (!sceneData.choices || sceneData.choices.length === 0) {
      const continueBtn = document.createElement('div');
      continueBtn.className = 'choice-btn';
      continueBtn.innerHTML = 'Продолжить';
      continueBtn.onclick = () => goToNextScene();
      choicesContainer.appendChild(continueBtn);
      return;
    }

    sceneData.choices.forEach(choice => {
      const btn = document.createElement('div');
      btn.className = 'choice-btn';

      // Content
      let contentHtml = `<span class="choice-content">${choice.data.text}</span>`;

      // Badges
      let badgeHtml = '';
      if(choice.data.premium) {
        badgeHtml += `<span class="premium-badge">${choice.data.diamonds_cost} 💎</span>`;
      }
      if(choice.data.only_leader) {
        badgeHtml += `<span class="premium-badge">👥</span>`;
      }
      if(!choice.is_available) {
        badgeHtml += `<span class="premium-badge">🔒</span>`;
      }

      if(badgeHtml) {
        contentHtml += `<div style="display:flex; align-items:center;">${badgeHtml}</div>`;
      }

      btn.innerHTML = contentHtml;
      btn.onclick = () => makeChoice(choice.data.id);
      choicesContainer.appendChild(btn);
    });
  }

  async function makeChoice(choiceId) {
    try {
      const response = await fetch(`/api/games/${storyId}/choice`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ choice_id: choiceId, slot: 1 })
      });

      const data = await response.json();

      if (response.ok && data.success) {
        sceneData = data.next_scene;
        loadScene();
      } else {
        alert(data.message || 'Ошибка выбора');
      }
    } catch (error) {
      console.error(error);
      alert('Ошибка сети');
    }
  }

  async function makeInputChoice() {
    const sceneId = sceneData.scene_id;
    const choiceValue = document.querySelector('.input-wrapper input').value;

    try {
      const response = await fetch(`/api/games/${storyId}/choice_input`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value: choiceValue, scene_id: sceneId })
      });

      const data = await response.json();

      if (response.ok && data.success) {
        sceneData = data.next_scene;
        loadScene();
      } else {
        alert(data.message || 'Ошибка');
      }
    } catch (error) {
      console.error(error);
      alert('Ошибка сети');
    }
  }

  async function goToNextScene() {
    try {
      const response = await fetch(`/api/games/${storyId}/to_next_scene`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      });

      const data = await response.json();

      if (response.ok && data.success) {
        sceneData = data.next_scene;
        loadScene();
      } else {
        if (data.is_ending) {
          window.location.href = `/ending/${storyId}/`;
        } else {
          alert(data.message || 'Ошибка');
        }
      }
    } catch (error) {
      console.error(error);
      alert('Ошибка сети');
    }
  }

  function goBack() { window.location.href = '/dashboard'; }
  function exitToDashboard() { window.location.href = '/dashboard'; }

  function showMenu() {
    document.getElementById('gameMenu').classList.add('show');
  }
  function hideMenu() {
    document.getElementById('gameMenu').classList.remove('show');
  }

  function toggleDialogues() {
    const container = document.getElementById('dialogueContainer');
    container.classList.toggle('hide');
  }

  function showDiamondModal() {
    const modal = document.getElementById('diamondModal');
    const balance = sceneData.current_user_diamonds || {{ user.diamonds }};
    document.getElementById('modalDiamondBalance').textContent = balance + " 💎";
    modal.classList.add('show');
  }

  function hideDiamondModal() {
    document.getElementById('diamondModal').classList.remove('show');
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      hideDiamondModal();
      hideMenu();
    }
  });
</script>

</body>
</html>
