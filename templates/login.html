{% extends "base.html" %}

{% block title %}Вход — USSC Romance{% endblock %}

{% block content %}
<!-- Подключение шрифтов -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">

<div class="auth-wrapper">
  <div class="auth-background"></div>
  <div class="auth-glow"></div>

  <div class="auth-card glass-panel fade-in-up">

    <!-- Логотип -->
    <div class="auth-header">
      <div class="brand-icon">💖</div>
      <h1 class="auth-title">USSC <span class="highlight">Romance</span></h1>
      <p class="auth-subtitle">Войдите, чтобы продолжить вашу историю любви</p>
    </div>

    <!-- Форма -->
    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label for="identifier">Имя пользователя или Email</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="identifier"
            name="identifier"
            placeholder="Введите имя или email"
            required
            autocomplete="username"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <div class="input-wrapper">
          <span class="input-icon">🔐</span>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Введите пароль"
            required
            autocomplete="current-password"
          >
        </div>
      </div>

      <div id="errorMessage" class="error-message" style="display: none;"></div>

      <button type="submit" class="btn-primary">
        <span class="btn-text">Войти</span>
        <span class="btn-glow"></span>
      </button>
    </form>

    <!-- Футер -->
    <div class="auth-footer">
      <p>Нет аккаунта? <a href="{{ url_for('register_page') }}">Создать историю</a></p>
    </div>
  </div>
</div>

<style>
  :root {
    /* Базовая палитра (Purple Theme) */
    --bg-deep: #050508;
    --bg-surface: #0f0f16;
    --primary: #8b5cf6;
    --primary-dark: #7c3aed;
    --primary-glow: rgba(139, 92, 246, 0.5);
    --accent: #d8b4fe;
    --text-main: #ffffff;
    --text-muted: #94a3b8;
    --glass-bg: rgba(20, 20, 30, 0.7);
    --glass-border: rgba(255, 255, 255, 0.08);
    --input-bg: rgba(255, 255, 255, 0.03);
    --error-color: #ef4444;
    --error-glow: rgba(239, 68, 68, 0.3);

    --font-display: 'Playfair Display', serif;
    --font-ui: 'Inter', sans-serif;

    --radius-lg: 24px;
    --radius-md: 16px;
    --radius-sm: 8px;
  }

  /* Темы */
  [data-theme="orange"] {
    --primary: #f97316;
    --primary-dark: #ea580c;
    --primary-glow: rgba(249, 115, 22, 0.5);
    --accent: #fdba74;
    --bg-deep: #080402;
    --bg-surface: #150a05;
    --error-glow: rgba(239, 68, 68, 0.3);
  }

  [data-theme="dark-green"] {
    --primary: #10b981;
    --primary-dark: #059669;
    --primary-glow: rgba(16, 185, 129, 0.5);
    --accent: #6ee7b7;
    --bg-deep: #020403;
    --bg-surface: #05150f;
    --error-glow: rgba(239, 68, 68, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    font-family: var(--font-ui);
    background-color: var(--bg-deep);
    background-image:
      radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
    color: var(--text-main);
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    inset: 0;
  }

  .auth-wrapper {
    position: relative;
    width: 100%;
    max-width: 480px;
    z-index: 10;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .auth-background {
    position: absolute;
    inset: -50px;
    background: radial-gradient(ellipse at top, rgba(139, 92, 246, 0.15), transparent 60%),
                radial-gradient(ellipse at bottom, rgba(139, 92, 246, 0.08), transparent 50%);
    filter: blur(40px);
    z-index: -1;
    pointer-events: none;
  }

  .auth-glow {
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
    opacity: 0.4;
    filter: blur(60px);
    z-index: -1;
    animation: pulse 4s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(1); }
    50% { opacity: 0.5; transform: translateX(-50%) scale(1.1); }
  }

  .auth-card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 48px 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(139, 92, 246, 0.1);
    position: relative;
    overflow: hidden;
    width: 100%;
    max-height: 95vh;
    overflow-y: auto;
  }

  .auth-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    pointer-events: none;
  }

  /* Скроллбар для карточки */
  .auth-card::-webkit-scrollbar {
    width: 4px;
  }
  .auth-card::-webkit-scrollbar-track {
    background: transparent;
  }
  .auth-card::-webkit-scrollbar-thumb {
    background: var(--glass-border);
    border-radius: 4px;
  }

  /* Header */
  .auth-header {
    text-align: center;
    margin-bottom: 40px;
    flex-shrink: 0;
  }

  .brand-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: inline-block;
    filter: drop-shadow(0 0 15px var(--primary-glow));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .auth-title {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .highlight {
    color: var(--primary);
    font-style: italic;
  }

  .auth-subtitle {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.5;
  }

  /* Form */
  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 16px;
    font-size: 16px;
    color: var(--text-muted);
    z-index: 2;
    pointer-events: none;
  }

  .form-group input {
    width: 100%;
    padding: 14px 16px 14px 48px;
    background: var(--input-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    color: var(--text-main);
    font-size: 15px;
    font-family: var(--font-ui);
    transition: all 0.3s ease;
  }

  .form-group input:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(255, 255, 255, 0.06);
    box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
  }

  .form-group input::placeholder {
    color: var(--text-muted);
    opacity: 0.7;
  }

  /* Error Message */
  .error-message {
    padding: 12px 16px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--error-color);
    border-left: 3px solid var(--error-color);
    border-radius: var(--radius-sm);
    color: #fca5a5;
    font-size: 13px;
    animation: shake 0.4s ease-in-out;
    flex-shrink: 0;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* Button */
  .btn-primary {
    position: relative;
    padding: 14px 28px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    border-radius: 50px;
    color: white;
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font-ui);
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 25px var(--primary-glow);
    overflow: hidden;
    margin-top: 8px;
    flex-shrink: 0;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 35px var(--primary-glow);
    filter: brightness(1.05);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .btn-glow {
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .btn-primary:hover .btn-glow {
    opacity: 1;
  }

  .btn-primary.loading .btn-text {
    opacity: 0;
  }

  .btn-primary.loading::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    margin: -10px 0 0 -10px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Footer */
  .auth-footer {
    text-align: center;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--glass-border);
    flex-shrink: 0;
  }

  .auth-footer p {
    color: var(--text-muted);
    font-size: 14px;
  }

  .auth-footer a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    transition: all 0.2s;
    position: relative;
  }

  .auth-footer a::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--primary);
    transition: width 0.2s;
  }

  .auth-footer a:hover {
    color: var(--accent);
  }

  .auth-footer a:hover::after {
    width: 100%;
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in-up {
    animation: fadeInUp 0.6s ease-out forwards;
  }

  /* Mobile Responsive — фиксация по центру */
  @media (max-width: 600px) {
    body {
      padding: 0;
    }

    .auth-wrapper {
      padding: 16px;
      min-height: 100dvh;
    }

    .auth-card {
      padding: 40px 28px;
      border-radius: 24px;
      max-height: 90dvh;
    }

    .auth-title { font-size: 28px; }
    .brand-icon { font-size: 40px; }

    .form-group input {
      padding: 13px 16px 13px 44px;
      font-size: 14px;
    }

    .btn-primary {
      padding: 13px 24px;
      font-size: 15px;
    }

    .auth-header { margin-bottom: 32px; }
    .auth-footer { margin-top: 24px; padding-top: 20px; }
  }

  /* Для очень маленьких экранов */
  @media (max-height: 700px) and (max-width: 600px) {
    .auth-card {
      padding: 32px 24px;
      max-height: 95dvh;
    }
    .auth-header { margin-bottom: 24px; }
    .brand-icon { font-size: 36px; margin-bottom: 12px; }
    .auth-title { font-size: 24px; }
    .auth-subtitle { font-size: 14px; }
    .form-group { gap: 12px; }
    .auth-footer { margin-top: 20px; padding-top: 16px; }
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Предотвращаем скролл страницы на мобильных при фокусе на инпуты
  const inputs = document.querySelectorAll('input');
  inputs.forEach(input => {
    input.addEventListener('focus', function() {
      if (window.innerWidth <= 600) {
        setTimeout(() => {
          window.scrollTo(0, 0);
          document.body.scrollTop = 0;
          document.documentElement.scrollTop = 0;
        }, 100);
      }
    });
  });

  const loginForm = document.getElementById('loginForm');
  const errorMessage = document.getElementById('errorMessage');

  loginForm.addEventListener('submit', async function(e) {
    e.preventDefault();

    const identifier = document.getElementById('identifier').value.trim();
    const password = document.getElementById('password').value;

    if (!identifier || !password) {
      showError('Пожалуйста, заполните все поля');
      return;
    }

    const submitBtn = loginForm.querySelector('button[type="submit"]');
    submitBtn.classList.add('loading');
    submitBtn.disabled = true;
    errorMessage.style.display = 'none';

    try {
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifier, password })
      });

      const data = await response.json();

      if (response.ok && data.success) {
        window.location.href = '/dashboard';
      } else {
        showError(data.error || 'Ошибка авторизации');
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    } catch (error) {
      console.error('Ошибка:', error);
      showError('Ошибка подключения к серверу');
      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;
    }
  });

  function showError(message) {
    errorMessage.textContent = message;
    errorMessage.style.display = 'block';
    errorMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
});
</script>
{% endblock %}
